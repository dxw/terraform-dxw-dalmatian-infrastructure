name: Continuous integration

on:
  push:
    branches: main
  pull_request:

env:
  GITHUB_PR_BRANCH: ""

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get terraform version
        id: get-terraform-version
        run: |
          DOTFILE_VERSION=$(cat .terraform-version)
          echo "version=$DOTFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Remove AWS backend
        run: rm ./backend.tf

      - name: Pull Terraform image
        run: |
          docker pull hashicorp/terraform:${{ steps.get-terraform-version.outputs.version }}

      - name: Run a Terraform init
        run: |
          docker run \
            --rm \
            -v $(pwd):/terraform \
            -w /terraform \
            hashicorp/terraform:${{ steps.get-terraform-version.outputs.version }} \
            init

      - name: Run a Terraform validate
        run: |
          docker run \
            --rm \
            -v $(pwd):/terraform \
            -w /terraform \
            hashicorp/terraform:${{ steps.get-terraform-version.outputs.version }} \
            validate

      - name: Run a Terraform format check
        run: |
          docker run \
            --rm \
            -v $(pwd):/terraform \
            -w /terraform \
            hashicorp/terraform:${{ steps.get-terraform-version.outputs.version }} \
            fmt -check=true -diff=true

  terraform-docs-validation:
    name: Terraform Docs validation
    needs: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.TERRAFORM_DOCS_APP_ID }}
          private-key: ${{ secrets.TERRAFORM_DOCS_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Get commit message
        run: |
          echo "GIT_COMMIT_MESSAGE=$(git show -s --format=%s)" >> $GITHUB_ENV

      - name: Generate Terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: .
          config-file: .terraform-docs.yml
          output-file: README.md
          output-method: inject
          git-push: false
          fail-on-diff: false

      - name: Check for documentation diffs
        if: "!startsWith(github.head_ref || github.ref_name, 'renovate/')"
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            echo "Documentation is out of date. Please run 'terraform-docs' locally and commit the changes."
            git diff README.md
            exit 1
          fi

      - name: Auto-commit updated documentation
        if: "startsWith(github.head_ref || github.ref_name, 'renovate/')"
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "${{ env.GIT_COMMIT_MESSAGE }} - Regenerate Terraform docs"
          file_pattern: README.md
